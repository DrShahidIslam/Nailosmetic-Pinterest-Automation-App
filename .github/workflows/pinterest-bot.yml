# ============================================================
# Nailosmetic Pinterest Automation Bot — GitHub Actions Workflow
# ============================================================
# This workflow runs the Pinterest bot every day at 14:00 UTC.
# It can also be triggered manually from the Actions tab.

name: 📌 Daily Pinterest Pin

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run 12 times a day (every 2 hours) — 4 niches need more coverage
    - cron: "0 */2 * * *"

  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

concurrency:
  group: bot-data-sync
  cancel-in-progress: false

jobs:
  publish-pin:
    name: Generate & Publish Nail Art Pin
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to update links_queue.json

    steps:
      # 1. Check out the repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the bot
      - name: 🚀 Run Pinterest Bot
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          HUGGINGFACE_API_KEYS: ${{ secrets.HUGGINGFACE_API_KEYS }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_AESTHETIC: ${{ secrets.PINTEREST_BOARD_AESTHETIC }}
          PINTEREST_BOARD_CHROME: ${{ secrets.PINTEREST_BOARD_CHROME }}
          PINTEREST_BOARD_MINIMALIST: ${{ secrets.PINTEREST_BOARD_MINIMALIST }}
          PINTEREST_BOARD_SPRING: ${{ secrets.PINTEREST_BOARD_SPRING }}
          PINTEREST_BOARD_SUMMER: ${{ secrets.PINTEREST_BOARD_SUMMER }}
          PINTEREST_BOARD_HAIR: ${{ secrets.PINTEREST_BOARD_HAIR }}
          PINTEREST_BOARD_BEAUTY: ${{ secrets.PINTEREST_BOARD_BEAUTY }}
          PINTEREST_BOARD_HOME: ${{ secrets.PINTEREST_BOARD_HOME }}
          PINTEREST_BOARD_GARDEN: ${{ secrets.PINTEREST_BOARD_GARDEN }}
          PINTEREST_BOARD_FASHION: ${{ secrets.PINTEREST_BOARD_FASHION }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
        run: python main.py

      # 5. Commit shared data changes
      - name: 💾 Commit updated history and queue
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add shared/*.json
          git commit -m "📝 Update history and link queue [skip ci]" || exit 0
          
          # Use a robust pull strategy: pull remote changes, then re-merge our data
          git pull --rebase origin main || (
            echo "⚠️ Conflict detected! Running Smart Merge..."
            git rebase --abort
            git fetch origin main
            python shared_data_manager.py --resolve-conflicts
            git add shared/*.json
            git commit -m "📝 Resolve data conflicts [skip ci]"
            # Fetch again just in case, then merge taking our resolved files
            git pull origin main --no-rebase -s recursive -X ours
          )
          git push
