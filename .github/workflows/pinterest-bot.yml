# ============================================================
# Nailosmetic Pinterest Automation Bot — GitHub Actions Workflow
# ============================================================
# This workflow runs the Pinterest bot every day at 14:00 UTC.
# It can also be triggered manually from the Actions tab.

name: 📌 Daily Pinterest Pin

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run every day at 14:00 UTC
    - cron: "0 14 * * *"

  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  publish-pin:
    name: Generate & Publish Nail Art Pin
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the bot
      - name: 🚀 Run Pinterest Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_AESTHETIC: ${{ secrets.PINTEREST_BOARD_AESTHETIC }}
          PINTEREST_BOARD_CHROME: ${{ secrets.PINTEREST_BOARD_CHROME }}
          PINTEREST_BOARD_MINIMALIST: ${{ secrets.PINTEREST_BOARD_MINIMALIST }}
          PINTEREST_BOARD_SPRING: ${{ secrets.PINTEREST_BOARD_SPRING }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
        run: python main.py
